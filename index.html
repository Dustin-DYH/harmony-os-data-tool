<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>鸿蒙智行定制化数据分析工具</title>
<script src="https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/exceljs@4.4.0/dist/exceljs.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Microsoft YaHei','PingFang SC',sans-serif;background:#f0f4f8;color:#333;min-height:100vh}
.header{background:linear-gradient(135deg,#1a1a2e,#16213e,#0f3460);color:#fff;padding:24px 0;text-align:center}
.header h1{font-size:24px;font-weight:700;letter-spacing:2px}
.header .sub{font-size:12px;opacity:0.7;margin-top:6px;letter-spacing:1px}
.container{max-width:960px;margin:0 auto;padding:20px}
.card{background:#fff;border-radius:10px;padding:24px;margin-bottom:16px;box-shadow:0 2px 8px rgba(0,0,0,0.06)}
.card h3{font-size:15px;color:#0f3460;margin-bottom:16px;border-left:3px solid #e94560;padding-left:10px}
.row{display:flex;gap:16px;flex-wrap:wrap}
.col{flex:1;min-width:180px}
.col-third{flex:1;min-width:140px}
label{display:block;font-size:13px;font-weight:600;color:#555;margin-bottom:6px}
input[type=file],input[type=date],input[type=text]{width:100%;padding:10px 12px;border:1.5px solid #ddd;border-radius:6px;font-size:13px;transition:border .2s}
input:focus{outline:none;border-color:#0f3460}
.file-zone{border:2px dashed #ccc;border-radius:8px;padding:20px;text-align:center;cursor:pointer;transition:all .2s;background:#fafbfc}
.file-zone:hover{border-color:#0f3460;background:#f0f2f8}
.file-zone.loaded{border-color:#548235;background:#f2f9f0}
.file-zone .icon{font-size:28px;margin-bottom:6px}
.file-zone .name{font-size:12px;color:#666;margin-top:4px;word-break:break-all}
.file-zone .count{font-size:11px;color:#999}
.btn{display:inline-block;padding:12px 32px;border:none;border-radius:6px;font-size:15px;font-weight:600;cursor:pointer;transition:all .2s}
.btn-primary{background:#0f3460;color:#fff;width:100%}
.btn-primary:hover{background:#1a1a2e}
.btn-primary:disabled{background:#ccc;cursor:not-allowed}
.btn-download{background:#e94560;color:#fff;width:100%;margin-top:12px}
.btn-download:hover{background:#c23152}
.status{padding:12px 16px;border-radius:6px;margin-top:12px;font-size:13px;display:none}
.status.info{background:#e8f0fe;color:#0f3460;display:block}
.status.success{background:#e2efda;color:#2d6a1e;display:block}
.status.error{background:#fce8e6;color:#c5221f;display:block}
.progress{margin-top:12px;background:#eee;border-radius:4px;overflow:hidden;display:none}
.progress-bar{height:6px;background:#0f3460;width:0;transition:width .3s}
.footer{text-align:center;padding:20px;color:#999;font-size:12px}
.note{font-size:11px;color:#999;margin-top:4px}
.badge{display:inline-block;background:#e94560;color:#fff;font-size:10px;padding:2px 8px;border-radius:10px;margin-left:6px;vertical-align:middle}
</style>
</head>
<body>
<div class="header">
  <h1>鸿蒙智行定制化数据分析工具 <span class="badge">beta v1.0</span></h1>
  <div class="sub">上传通话记录 + 个微客户数据 + 企微客户数据，生成标准化效能分析报告</div>
</div>

<div class="container">
  <div class="card">
    <h3>1. 上传数据文件</h3>
    <div class="row">
      <div class="col-third">
        <label>通话记录 (.xlsx)</label>
        <div class="file-zone" id="callZone" onclick="document.getElementById('callFile').click()">
          <div class="icon">📞</div>
          <div>通话记录</div>
          <div class="name" id="callName"></div>
          <div class="count" id="callCount"></div>
        </div>
        <input type="file" id="callFile" accept=".xlsx" style="display:none" onchange="loadFile('call')">
      </div>
      <div class="col-third">
        <label>个微客户数据 (.xlsx) <span style="color:#999;font-weight:400">选填</span></label>
        <div class="file-zone" id="wxZone" onclick="document.getElementById('wxFile').click()">
          <div class="icon">💬</div>
          <div>个微客户数据</div>
          <div class="name" id="wxName"></div>
          <div class="count" id="wxCount"></div>
        </div>
        <input type="file" id="wxFile" accept=".xlsx" style="display:none" onchange="loadFile('wx')">
      </div>
      <div class="col-third">
        <label>企微客户数据 (.xlsx) <span style="color:#999;font-weight:400">选填</span></label>
        <div class="file-zone" id="qwZone" onclick="document.getElementById('qwFile').click()">
          <div class="icon">🏢</div>
          <div>企微客户数据</div>
          <div class="name" id="qwName"></div>
          <div class="count" id="qwCount"></div>
        </div>
        <input type="file" id="qwFile" accept=".xlsx" style="display:none" onchange="loadFile('qw')">
      </div>
    </div>
  </div>

  <div class="card">
    <h3>2. 分析设置</h3>
    <div class="row">
      <div class="col">
        <label>门店名称</label>
        <input type="text" id="brandName" value="" placeholder="如：首钢店">
      </div>
      <div class="col">
        <label>日报日期</label>
        <input type="date" id="reportDate">
      </div>
    </div>
    <div class="note" style="margin-top:8px">日报日期自动确定所在周范围(KW周号)，趋势和效能分析基于全量数据</div>
  </div>

  <div class="card">
    <h3>3. 生成报告</h3>
    <button class="btn btn-primary" id="genBtn" onclick="generate()" disabled>请先上传通话数据</button>
    <div class="progress" id="progress"><div class="progress-bar" id="progressBar"></div></div>
    <div class="status" id="status"></div>
    <button class="btn btn-download" id="dlBtn" style="display:none" onclick="download()">下载分析报告 (.xlsx)</button>
  </div>
</div>
<div class="footer">鸿蒙智行定制化数据分析工具 beta版 v0.1 | 纯前端处理，数据不上传服务器</div>

<script>
// ===================== 全局状态 =====================
let callData = null, wxData = null, qwData = null, resultBlob = null;
let callFields = {}, wxFields = {}, qwFields = {};

// ===================== 字段自动识别 =====================
const CALL_PATTERNS = {
  callTime: ['来电时间', '呼出时间', '来电时间/呼出时间'],
  employee: ['通话人'],
  dept: ['通话人所属部门', '所属部门', '部门'],
  direction: ['呼入/呼出', '呼入呼出', '方向'],
  connStatus: ['接通状态'],
  phone: ['手机号码', '手机号'],
  duration: ['通话时长', '时长'],
};

const WX_PATTERNS = {
  employee: ['员工姓名', '姓名'],
  addTime: ['添加/上传时间', '添加时间', '上传时间'],
  dept: ['所属部门', '部门'],
  phone: ['客户微信手机号', '关联手机号', '手机号'],
};

const QW_PATTERNS = {
  employee: ['工作台姓名', '员工姓名', '姓名'],
  addTime: ['添加时间'],
  dept: ['所属部门', '部门'],
};

function detectFields(headers, patterns) {
  const result = {};
  for (const [key, candidates] of Object.entries(patterns)) {
    for (const c of candidates) {
      for (const h of headers) {
        const hstr = String(h).trim();
        if (hstr.includes(c)) { result[key] = hstr; break; }
      }
      if (result[key]) break;
    }
    if (!result[key]) result[key] = null;
  }
  return result;
}

// ===================== 文件加载 =====================
function loadFile(type) {
  const input = document.getElementById(type + 'File');
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(e) {
    const wb = XLSX.read(e.target.result, {type:'array'});
    const ws = wb.Sheets[wb.SheetNames[0]];
    const rows = XLSX.utils.sheet_to_json(ws, {header:1, defval:''});
    if (rows.length < 2) return showStatus('error', '文件为空或格式不正确');
    const headers = rows[0];
    const data = rows.slice(1).filter(r => r.some(c => c !== ''));
    if (type === 'call') {
      callFields = detectFields(headers, CALL_PATTERNS);
      callData = { headers, data, fields: callFields, total: data.length };
      document.getElementById('callName').textContent = file.name;
      document.getElementById('callCount').textContent = `${data.length} 条 · ${headers.length} 列`;
      document.getElementById('callZone').classList.add('loaded');
    } else if (type === 'wx') {
      wxFields = detectFields(headers, WX_PATTERNS);
      wxData = { headers, data, fields: wxFields, total: data.length };
      document.getElementById('wxName').textContent = file.name;
      document.getElementById('wxCount').textContent = `${data.length} 条 · ${headers.length} 列`;
      document.getElementById('wxZone').classList.add('loaded');
    } else {
      qwFields = detectFields(headers, QW_PATTERNS);
      qwData = { headers, data, fields: qwFields, total: data.length };
      document.getElementById('qwName').textContent = file.name;
      document.getElementById('qwCount').textContent = `${data.length} 条 · ${headers.length} 列`;
      document.getElementById('qwZone').classList.add('loaded');
    }
    updateGenBtn();
  };
  reader.readAsArrayBuffer(file);
}

function updateGenBtn() {
  const btn = document.getElementById('genBtn');
  if (callData) { btn.disabled = false; btn.textContent = '生成分析报告'; }
}

// ===================== 工具函数 =====================
function colIdx(fields, key, headers) {
  const name = fields[key];
  if (!name) return -1;
  return headers.indexOf(name);
}

function parseDate(val) {
  if (!val || val === '') return null;
  if (val instanceof Date) return val;
  const str = String(val).trim();
  if (/^\d{5}$/.test(str)) {
    const d = new Date((Number(str) - 25569) * 86400 * 1000);
    return isNaN(d.getTime()) ? null : d;
  }
  const d = new Date(str);
  return isNaN(d.getTime()) ? null : d;
}

function parseDuration(val) {
  if (!val || val === '') return 0;
  const str = String(val).trim();
  const m = str.match(/(\d+)'(\d+)/);
  if (m) return parseInt(m[1]) * 60 + parseInt(m[2]);
  const n = parseFloat(str);
  return isNaN(n) ? 0 : n * 60;
}

function isConnected(status) {
  if (!status) return false;
  return String(status).includes('已接通');
}

function isOutbound(direction) {
  if (!direction) return true; // default to outbound
  return String(direction).includes('呼出');
}

function extractStore(dept) {
  if (!dept) return '未分组';
  const str = String(dept).trim();
  const m = str.match(/（(.+?)）/);
  if (m) return m[1];
  return str.length > 12 ? str.slice(0, 12) + '...' : str;
}

function dateStr(d) {
  const y = d.getFullYear();
  const m = String(d.getMonth() + 1).padStart(2, '0');
  const day = String(d.getDate()).padStart(2, '0');
  return `${y}-${m}-${day}`;
}

function getMonday(d) {
  const day = d.getDay();
  const diff = day === 0 ? -6 : 1 - day;
  const mon = new Date(d);
  mon.setDate(d.getDate() + diff);
  return mon;
}

function getWeekNumber(d) {
  const start = new Date(d.getFullYear(), 0, 1);
  const days = Math.floor((d - start) / (86400000));
  return Math.ceil((days + start.getDay() + 1) / 7);
}

// ===================== 数据处理 =====================
function processCallData() {
  const h = callData.headers;
  const fields = callData.fields;
  const ci_time = colIdx(fields, 'callTime', h);
  const ci_emp = colIdx(fields, 'employee', h);
  const ci_dept = colIdx(fields, 'dept', h);
  const ci_dir = colIdx(fields, 'direction', h);
  const ci_conn = colIdx(fields, 'connStatus', h);
  const ci_phone = colIdx(fields, 'phone', h);
  const ci_dur = colIdx(fields, 'duration', h);

  const records = [];
  for (const row of callData.data) {
    const time = parseDate(row[ci_time]);
    if (!time) continue;
    const emp = String(row[ci_emp] || '').trim();
    if (/^\d{11}$/.test(emp)) continue;
    const dept = String(row[ci_dept] || '');
    const direction = String(row[ci_dir] || '');
    const conn = isConnected(row[ci_conn]);
    const phone = String(row[ci_phone] || '');
    const durSec = parseDuration(row[ci_dur]);
    const outbound = isOutbound(direction);
    const store = extractStore(dept);

    records.push({
      time, emp, dept, conn, phone, durSec, store, outbound,
      date: dateStr(time),
      hour: time.getHours(),
      weekday: time.getDay() === 0 ? 6 : time.getDay() - 1,
      over30s: conn && durSec >= 30,
      over3min: conn && durSec >= 180,
    });
  }

  // 老客/新客判断：全量首次接触（含呼入+呼出），精确到时间戳
  // 外呼若为该号码的首次接触 → 新客；否则 → 老客跟进
  const phoneFirstContact = {};
  const allSorted = [...records]
    .filter(r => r.phone && r.phone !== '--')
    .sort((a, b) => a.time - b.time);
  for (const r of allSorted) {
    if (!(r.phone in phoneFirstContact)) {
      phoneFirstContact[r.phone] = r.time.getTime(); // 存储首次接触的精确时间戳
    }
  }
  for (const r of records) {
    if (!r.outbound || !r.phone || r.phone === '--') {
      r.isNewCustomer = false;
      r.isReturning = false;
      continue;
    }
    r.isNewCustomer = phoneFirstContact[r.phone] === r.time.getTime();
    r.isReturning = !r.isNewCustomer;
  }

  return records;
}

function processWxData() {
  if (!wxData) return [];
  const h = wxData.headers;
  const fields = wxData.fields;
  const ci_emp = colIdx(fields, 'employee', h);
  const ci_time = colIdx(fields, 'addTime', h);
  const ci_dept = colIdx(fields, 'dept', h);
  const records = [];
  for (const row of wxData.data) {
    const emp = String(row[ci_emp] || '').trim();
    if (!emp) continue;
    const time = parseDate(row[ci_time]);
    const dept = String(row[ci_dept] || '');
    const store = extractStore(dept);
    records.push({ emp, store, date: time ? dateStr(time) : null, time });
  }
  return records;
}

function processQwData() {
  if (!qwData) return [];
  const h = qwData.headers;
  const fields = qwData.fields;
  const ci_emp = colIdx(fields, 'employee', h);
  const ci_time = colIdx(fields, 'addTime', h);
  const ci_dept = colIdx(fields, 'dept', h);
  const records = [];
  for (const row of qwData.data) {
    const emp = String(row[ci_emp] || '').trim();
    if (!emp) continue;
    const time = parseDate(row[ci_time]);
    const dept = String(row[ci_dept] || '');
    const store = extractStore(dept);
    records.push({ emp, store, date: time ? dateStr(time) : null, time });
  }
  return records;
}

// ===================== 报告生成 =====================
async function generate() {
  if (!callData) return;
  const brand = document.getElementById('brandName').value.trim() || '品牌';
  const dateVal = document.getElementById('reportDate').value;
  if (!dateVal) return showStatus('error', '请选择日报日期');

  const reportDate = new Date(dateVal + 'T00:00:00');
  const reportDateStr = dateStr(reportDate);
  const weekStart = getMonday(reportDate);
  const weekEnd = new Date(reportDate);
  const weekStartStr = dateStr(weekStart);
  const weekEndStr = dateStr(reportDate);
  const kw = getWeekNumber(reportDate);
  const todayStr = dateStr(new Date());

  showStatus('info', '正在处理数据...');
  document.getElementById('progress').style.display = 'block';
  updateProgress(8);

  const callRecords = processCallData();
  updateProgress(20);
  const wxRecords = processWxData();
  updateProgress(28);
  const qwRecords = processQwData();
  updateProgress(35);

  // 统计
  const allDates = [...new Set(callRecords.map(r => r.date))].sort();
  const nDays = allDates.length;
  const fullStart = allDates[0], fullEnd = allDates[allDates.length - 1];

  const stores = [...new Set(callRecords.map(r => r.store))];
  stores.sort((a,b) => callRecords.filter(r=>r.store===b).length - callRecords.filter(r=>r.store===a).length);
  // 隐藏无外呼无加微的门店
  const activeStoreSet = new Set([
    ...callRecords.filter(r => r.outbound).map(r => r.store),
    ...wxRecords.map(r => r.store),
    ...qwRecords.map(r => r.store)
  ]);
  const visibleStores = stores.filter(s => activeStoreSet.has(s) && s !== '--' && s !== '未分组');

  const callEmps = [...new Set(callRecords.map(r => r.emp))];
  const wxEmps = [...new Set(wxRecords.map(r => r.emp))];
  const qwEmps = [...new Set(qwRecords.map(r => r.emp))];
  const allEmps = [...new Set([...callEmps, ...wxEmps, ...qwEmps])];
  const dualEmps = callEmps.filter(e => qwEmps.includes(e));

  // 日报数据
  const dayRecords = callRecords.filter(r => r.date === reportDateStr);
  const dayOut = dayRecords.filter(r => r.outbound);
  const dayIn = dayRecords.filter(r => !r.outbound);
  const dayTotal = dayRecords.length;
  const dayOutTotal = dayOut.length;
  const dayOutConn = dayOut.filter(r => r.conn).length;
  const dayOutRate = dayOutTotal > 0 ? dayOutConn / dayOutTotal : 0;
  const dayInTotal = dayIn.length;
  const dayInConn = dayIn.filter(r => r.conn).length;
  const dayInRate = dayInTotal > 0 ? dayInConn / dayInTotal : 0;
  const dayOutDur = dayOut.filter(r => r.conn).reduce((s, r) => s + r.durSec, 0) / 60;
  const dayTotalDur = dayRecords.filter(r => r.conn).reduce((s, r) => s + r.durSec, 0) / 60;
  const dayOutOver30 = dayOut.filter(r => r.over30s).length;
  const dayOutOver30Rate = dayOutConn > 0 ? dayOutOver30 / dayOutConn : 0;
  const dayOutOver3min = dayOut.filter(r => r.over3min).length;
  const dayOutAvgDur = dayOutConn > 0 ? dayOutDur / dayOutConn : 0;
  const dayNewCust = dayOut.filter(r => r.isNewCustomer).length;
  const dayReturnCust = dayOut.filter(r => r.isReturning).length;
  const dayWx = wxRecords.filter(r => r.date === reportDateStr);
  const dayWxCount = dayWx.length;
  const dayQw = qwRecords.filter(r => r.date === reportDateStr);
  const dayQwCount = dayQw.length;
  const dayActive = [...new Set([...dayOut.map(r=>r.emp), ...dayWx.map(r=>r.emp), ...dayQw.map(r=>r.emp)])].length;
  const dayStores = [...new Set([...dayOut.map(r=>r.store), ...dayWx.map(r=>r.store), ...dayQw.map(r=>r.store)])].filter(s => s !== '--' && s !== '未分组').length;
  const dayPerCapDur = dayActive > 0 ? dayTotalDur / dayActive : 0;

  // 全量
  const totalOut = callRecords.filter(r => r.outbound).length;
  const totalOutConn = callRecords.filter(r => r.outbound && r.conn).length;
  const totalOutRate = totalOut > 0 ? totalOutConn / totalOut : 0;
  const totalIn = callRecords.filter(r => !r.outbound).length;
  const totalInConn = callRecords.filter(r => !r.outbound && r.conn).length;
  const totalInRate = totalIn > 0 ? totalInConn / totalIn : 0;
  const totalOutDur = callRecords.filter(r => r.outbound && r.conn).reduce((s, r) => s + r.durSec, 0) / 60;
  const totalDur = callRecords.filter(r => r.conn).reduce((s, r) => s + r.durSec, 0) / 60;
  const avgDaily = totalOut / nDays;
  const totalNewCust = callRecords.filter(r => r.outbound && r.isNewCustomer).length;
  const totalReturnCust = callRecords.filter(r => r.outbound && r.isReturning).length;

  // 当周
  const weekRecords = callRecords.filter(r => r.date >= weekStartStr && r.date <= weekEndStr);
  const weekWx = wxRecords.filter(r => r.date && r.date >= weekStartStr && r.date <= weekEndStr);
  const weekQw = qwRecords.filter(r => r.date && r.date >= weekStartStr && r.date <= weekEndStr);
  const weekWxTotal = weekWx.length;
  const weekQwTotal = weekQw.length;

  updateProgress(50);

  // ===================== 构建 Excel =====================
  const ExcelJS = window.ExcelJS;
  const wb = new ExcelJS.Workbook();
  wb.creator = '鸿蒙智行定制化数据分析工具 beta v1.0';

  const DARK_BLUE = '0f3460';
  const ACCENT_RED = 'e94560';
  const PALETTE = ['0f3460','16213e','533483','e94560','1a1a2e','533483','0f3460','e94560','16213e','533483'];
  const ALT_FILL = 'F2F4F8';
  const GOOD_FILL = 'E2EFDA';
  const BAD_FILL = 'F4B4C2';

  const hdrFill = { type:'pattern', pattern:'solid', fgColor:{argb:DARK_BLUE} };
  const hdrFont = { name:'Microsoft YaHei', size:10, bold:true, color:{argb:'FFFFFF'} };
  const catFill = { type:'pattern', pattern:'solid', fgColor:{argb:'16213e'} };
  const catFont = { name:'Microsoft YaHei', size:9, bold:true, color:{argb:'FFFFFF'} };
  const titleFont = { name:'Microsoft YaHei', size:14, bold:true, color:{argb:DARK_BLUE} };
  const subFont = { name:'Microsoft YaHei', size:11, bold:true, color:{argb:DARK_BLUE} };
  const bodyFont = { name:'Microsoft YaHei', size:10, color:{argb:'333333'} };
  const smallFont = { name:'Microsoft YaHei', size:9, color:{argb:'888888'} };
  const goldFont = { name:'Microsoft YaHei', size:11, bold:true, color:{argb:'BF8F00'} };
  const altFill = { type:'pattern', pattern:'solid', fgColor:{argb:ALT_FILL} };
  const goodFill = { type:'pattern', pattern:'solid', fgColor:{argb:GOOD_FILL} };
  const badFill = { type:'pattern', pattern:'solid', fgColor:{argb:BAD_FILL} };
  const thinBorder = { style:'thin', color:{argb:'C0C0C0'} };
  const centerAlign = { horizontal:'center', vertical:'middle', wrapText:true };
  const pctFmt = '0.0%';
  const scoreFmt = '0.00';

  function setHdr(rowObj, values, fill) {
    values.forEach((v, i) => {
      const c = rowObj.getCell(i + 1);

    if (calls >= 50 && rate > bestDowRate) { bestDowRate = rate; bestDowName = dn; }
    [dn, calls, conns, Math.round(rate*1e4)/1e4, eff].forEach((v,j)=>{
      setBodyCell(ws6.getRow(row).getCell(j+1), v, bodyFont, fill||null, j===3?pctFmt:null);
    });
    row++;
  });
  row++;
  const bh = bestHour ? `${String(bestHour[0]).padStart(2,'0')}:00（${bestHour[1]}通，${(bestHour[2]*100).toFixed(1)}%）` : '待积累';
  const bd = bestDowName ? `${bestDowName}（${(bestDowRate*100).toFixed(1)}%）` : '待积累';
  ws6.getCell(`A${row}`).value = `> 最佳外呼时段: ${bh} | 最佳日: ${bd}`;
  ws6.getCell(`A${row}`).font = {name:'Microsoft YaHei', size:10, bold:true, color:{argb:DARK_BLUE}};
  ws6.views = [{state:'frozen', ySplit:4}];
  updateProgress(97);

  // =================== Sheet 7: 周度综合结论 ===================
  const ws7 = wb.addWorksheet('周度综合结论');
  ws7.getCell('A1').value = '周度综合结论'; ws7.getCell('A1').font = titleFont;
  ws7.getCell('A2').value = `KW${kw} | ${weekStartStr}~${weekEndStr}（日报日期${reportDateStr}所在周）| 生成: ${todayStr}`;
  ws7.getCell('A2').font = goldFont;
  ws7.getCell('A4').value = '核心结论'; ws7.getCell('A4').font = subFont;
  row = 5;
  setHdr(ws7.getRow(row), ['#','结论','关键数据']);
  row++;
  const wOut = weekRecords.filter(r => r.outbound);
  const wOutCalls = wOut.length, wOutConn = wOut.filter(r=>r.conn).length;
  const wOutRate = wOutCalls>0?wOutConn/wOutCalls:0;
  const wIn = weekRecords.filter(r => !r.outbound);
  const conclusions = [
    [1, `本周${visibleStores.length}家门店${callEmps.length}名员工`, `外呼${wOutCalls}通，接通${wOutConn}通，呼入${wIn.length}通`],
    [2, `本周外呼接通率${(wOutRate*100).toFixed(1)}%`, `日均外呼${(wOutCalls/4).toFixed(0)}通/天，新客占比${wOutCalls>0?(wOut.filter(r=>r.isNewCustomer).length/wOutCalls*100).toFixed(1):0}%`],
    [3, `最佳外呼时段: ${bestHour?String(bestHour[0]).padStart(2,'0')+':00':'待积累'}`, bestHour?`${bestHour[1]}通 ${(bestHour[2]*100).toFixed(1)}%`:'' ],
    [4, `${callEmps.length}名员工使用通话系统`, `双系统并行${dualEmps.length}人，个微员工${wxEmps.length}人，企微员工${qwEmps.length}人`],
    [5, `企微本周新增${weekQwTotal}人，个微新增${weekWxTotal}人`, `企微全量${qwRecords.length}人，个微全量${wxRecords.length}人`],
  ];
  conclusions.forEach(([num, c, d]) => {
    [num, c, d].forEach((v,i)=>setBodyCell(ws7.getRow(row).getCell(i+1), v));
    row++;
  });
  altRow(ws7, 6, row-1, 3);

  row += 1;
  ws7.getCell(`A${row}`).value = '门店排名'; ws7.getCell(`A${row}`).font = subFont;
  row++;
  setHdr(ws7.getRow(row), ['排名','门店','外呼量','接通率','新客占比']);
  row++;
  const storeRanks = visibleStores.map(st => {
    const sd = callRecords.filter(r=>r.store===st && r.outbound);
    const calls = sd.length, conns = sd.filter(r=>r.conn).length;
    const newRatio = calls>0?sd.filter(r=>r.isNewCustomer).length/calls:0;
    return {st, calls, rate:calls>0?conns/calls:0, newRatio};
  }).sort((a,b) => b.rate - a.rate);
  storeRanks.forEach((sr, i) => {
    [i+1, sr.st, sr.calls, Math.round(sr.rate*1e4)/1e4, Math.round(sr.newRatio*1e4)/1e4].forEach((v,j)=>{
      setBodyCell(ws7.getRow(row).getCell(j+1), v, bodyFont, null, [3,4].includes(j)?pctFmt:null);
    });
    row++;
  });
  altRow(ws7, row-storeRanks.length, row-1, 5);
  ws7.views = [{state:'frozen', ySplit:3}];
  ws7.columns = [6,55,25,25,25].map(w => ({width:w}));

  updateProgress(100);

  // 导出
  showStatus('info', '正在生成Excel文件...');
  const buffer = await wb.xlsx.writeBuffer();
  resultBlob = new Blob([buffer], {type:'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet'});

  document.getElementById('dlBtn').style.display = 'block';
  document.getElementById('progress').style.display = 'none';
  showStatus('success', `报告生成完成！共 8 个Sheet：外呼${dayOutTotal}通，接通${dayOutConn}（${(dayOutRate*100).toFixed(1)}%），呼入${dayInTotal}通，企微加微${dayQwCount}人，个微加微${dayWxCount}人`);
}

function download() {
  if (!resultBlob) return;
  const reportDate = document.getElementById('reportDate').value;
  const brand = document.getElementById('brandName').value.trim() || '品牌';
  const dt = new Date(reportDate + 'T00:00:00');
  const mmdd = `${String(dt.getMonth()+1).padStart(2,'0')}${String(dt.getDate()).padStart(2,'0')}`;
  const today = dateStr(new Date()).replace(/-/g,'');
  const filename = `${mmdd}${brand}工作手机分析报告_${today}.xlsx`;

  const url = URL.createObjectURL(resultBlob);
  const a = document.createElement('a');
  a.href = url; a.download = filename;
  document.body.appendChild(a); a.click();
  document.body.removeChild(a); URL.revokeObjectURL(url);
}

// ===================== UI 辅助 =====================
function showStatus(type, msg) {
  const el = document.getElementById('status');
  el.className = 'status ' + type;
  el.textContent = msg;
}

function updateProgress(pct) {
  document.getElementById('progressBar').style.width = pct + '%';
}
</script>
</body>
</html>
